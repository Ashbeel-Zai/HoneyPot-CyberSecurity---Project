<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#89f7fe,#66a6ff);
        }

        .login-card{
            width:380px;
            padding:35px;
            background:white;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,0.15);
            text-align:center;
        }

        .logo{
            width:80px;
            height:80px;
            margin:auto;
            margin-bottom:15px;
            border-radius:50%;
            background:#66a6ff;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:35px;
            color:white;
        }

        h2{
            color:#333;
            margin-bottom:8px;
        }

        p{
            color:#777;
            margin-bottom:25px;
            font-size:14px;
        }

        .input-group{
            margin-bottom:15px;
        }

        input{
            width:100%;
            padding:14px;
            border:2px solid #e5e5e5;
            border-radius:12px;
            outline:none;
            transition:0.3s;
            font-size:15px;
        }

        input:focus{
            border-color:#66a6ff;
        }

        button{
            width:100%;
            padding:14px;
            border:none;
            border-radius:12px;
            background:#66a6ff;
            color:white;
            font-size:16px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#4e8fff;
            transform:translateY(-2px);
        }

        .footer{
            margin-top:15px;
            font-size:12px;
            color:#888;
        }
    </style>
</head>
<body>

    <div class="login-card">

        <div class="logo">🍯</div>

        <h2>Honey Dashboard</h2>
        <p>Administrator Access Required</p>

        <form action="/admin" method="POST">

            <div class="input-group">
                <input
                    type="text"
                    name="username"
                    placeholder="Username"
                    required>
            </div>

            <div class="input-group">
                <input
                    type="password"
                    name="password"
                    placeholder="Password"
                    required>
            </div>

            <button type="submit">
                Sign In
            </button>

        </form>

        <div class="footer">
            Secure Monitoring Portal
        </div>

    </div>

</body>
</html>
